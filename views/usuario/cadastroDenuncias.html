<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fala Votorantim - Cadastro de denuncias - Usuario</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="/style/usuario/style.css">
    <link rel="stylesheet" href="/style/usuario/cadastro.css">
</head>

<body>

    <div id="MenuMobi"></div>


    <header id="header"></header>
    <h1 id="cadastroH1" class="titulo container1024">Cadastro de Denúncias</h1>
    <div class="FundoForm box-shadow container1024">
        <form class="formularioDenuncia">




            <div class="row">
                <div class="col-3">
                    <label for="cep" class="form-label">CEP</label>
                    <input type="text" class="form-control" aria-describedby="emailHelp" id="cep" placeholder="111">
                </div>
                <div class="col-9">
                    <label for="nomeRua" class="form-label">Nome da Rua</label>

                    <input type="text" class="form-control" aria-describedby="emailHelp" id="nomeRua"
                        placeholder="José Emilio">
                </div>
            </div>

            <div class="row">
                <div class="col-3">
                    <label for="nomeRua" class="form-label">Numero</label>

                    <input type="text" class="form-control" aria-describedby="emailHelp" id="numeroCasa" placeholder="276">
                </div>
                <div class="col-4">
                    <label for="nomeRua" class="form-label">Complemento</label>

                    <input type="text" class="form-control" aria-describedby="emailHelp" id="complemento"
                        placeholder="José Emilio">
                </div>
                <div class="col-5">
                    <label for="nomeRua" class="form-label">Bairro</label>

                    <input type="text" class="form-control" aria-describedby="emailHelp" id="bairro"
                        placeholder="Konoha">
                </div>
            </div>

            <hr>

            <div class="description">
                <label for="nomeRua" class="form-label">Descrição do ocorrido</label>

                <textarea name="" id="" rows="3" class="form-control"
                    placeholder="Na Avenida Gisele Constantino, próximo ao bairro Parque Bela Vista, em Votorantim, há diversos buracos na via e falta de iluminação pública em alguns trechos. Durante a noite, motoristas e pedestres enfrentam dificuldades e riscos de acidentes. Solicito manutenção urgente e melhoria na iluminação do local."></textarea>
            </div>

            <hr>

            <div class="categoriaDenuncia">
                <label for="" class="form-label">Categoria da Denuncia</label>

                <select name="categoria" id="categoria" class="form-select" aria-label="Default select example">
                    <option selected>Selecione uma categoria</option>

                    <optgroup label="Infraestrutura">
                        <option value="">Buracos</option>
                        <option value="">Calçadas danificadas</option>
                        <option value="">Sinalização quebrada</option>
                    </optgroup>

                    <optgroup label="Iluminação">
                        <option value="">Postes apagados</option>
                        <option value="">Falta de iluminação</option>
                        <option value="">Problemas eletronicos urbanos</option>
                    </optgroup>

                    <optgroup label="Limpeza Urbana">
                        <option value="">Lixo acumulado</option>
                        <option value="">Entulho irregular</option>
                        <option value="">Terrenos abandonados</option>
                    </optgroup>

                    <optgroup label="Saneamento">
                        <option value="">Vazamento de água</option>
                        <option value="">Esgoto</option>
                        <option value="">Problemas em vias publicas</option>
                    </optgroup>
                </select>
            </div>

            <hr>

            <div class="resultadoEsperado">
                <label for="nomeRua" class="form-label">Resultado esperado</label>

                <textarea name="" id="" rows="3" class="form-control"
                    placeholder="Digite o resultado esperado da denuncia"></textarea>
            </div>

            <hr>

            <div class="alinhar">
                <div class="upload-box">
                    <img src="/img/upload.png" alt="Upload">

                    <h3>Faça Upload da sua imagem</h3>

                    <p class="formatos">Formatos JPEG, PNG, até 2MB</p>

                    <a href="#" class="selecionar">
                        arraste e solte ou clique para selecionar
                    </a>
                </div>
            </div>

            <div class="d-grid gap-2">
                <button class="btn btn-primary">Cadastrar denuncia</button>
            </div>
        </form>
    </div>



    <footer id="footer"></footer>


    <script src="/funcionalidades/usuario/headerFooterUsu.js"></script>
    <script src="/funcionalidades/usuario/feedEFiltroDenuncias.js"></script>
    <script src="/funcionalidades/usuario/PuxarMenu.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>

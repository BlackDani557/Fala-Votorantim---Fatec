<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fala Votorantim - Notificações - Usuário</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="/style/usuario/style.css">
    <link rel="stylesheet" href="/style/usuario/notificacoes.css">
</head>
<body>

    <div id="MenuMobi"></div>

    <header id="header"></header>

    <main class="telaPrincipal box-shadow">
        <h2>Notificações</h2>

        <div class="NotificacoesHoje">
            <label for="" class="form-label">Hoje</label>
            <div class="alert alert-primary">
                A denúncia (NOME DA DENÚNCIA) foi atualizada para: (STATUS ATUALIZADO)
            </div>
        </div>

        <div class="NotificacoesOntem">
            <label for="" class="form-label">Ontem</label>
            <div class="alert alert-secondary">
                A denúncia (NOME DA DENÚNCIA) foi atualizada para: (STATUS ATUALIZADO)
            </div>
        </div>

        <div class="Anteriores">
            <label for="" class="form-label">10/05/2026</label>
            <div class="alert alert-danger">
                A denúncia (NOME DA DENÚNCIA) foi atualizada para: (STATUS ATUALIZADO)
            </div>
        </div>
    </main>

    
    <footer id="footer"></footer>

    <script src="/funcionalidades/usuario/headerFooterUsu.js"></script>
    <script src="/funcionalidades/usuario/feedEFiltroDenuncias.js"></script>
    <script src="/funcionalidades/usuario/PuxarMenu.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>

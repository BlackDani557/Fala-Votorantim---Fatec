<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fala Votorantim - Cadastro de denuncias - Usuario</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/cadastro.css">
</head>
<body>
    <header id="header"></header>
    <h1>Cadastro de Denúncias</h1>
    <div class="FundoForm">
        <form>
            <label for="CEP" class="form-label">CEP</label>
            <input type="text" class="form-control" name="" id="CEP">
            <label for="Rua" class="form-label">Nome da Rua</label>
            <input type="text" class="form-control" name="" id="rua">
            <label for="numero" class="form-label">Número</label>
            <input type="text" class="form-control" name="" id="numero">
            <label for="complemento" class="form-label">Complemento</label>
            <input type="text" class="form-control" name="" id="complemento">
            <label for="bairro" class="form-label">Bairro</label>
            <input type="text" class="form-control" name="" id="bairro">
            <hr>
            <label for="descricao" class="form-label">Descrição do ocorrido</label>
            <textarea name="" class="form-control" rows="6" id="descricao"></textarea>
            <hr>
            <label for="categoria" class="form-label">Categoria da denúncia</label>
            <select name="" class="form-select" id="categoria">
                <option value="buraco"></option>
            </select>
            <hr>
            <label for="resultado" class="form-label">Resultado esperado</label>
            <textarea name="" class="form-control" rows="6" id="resultado"></textarea>
        </form>
    </div>

    <footer id="footer"></footer>
    <script src="funcionalidades/puxarHeaderFooterUsu.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>

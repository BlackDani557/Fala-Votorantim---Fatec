<form class="container1024">
    <h1 id="PessoaCargo">Admin</h1>
    <h3 id="SubtituloPáginaAtual">Inicio ADM</h3>
    <div class="Wrapper box-shadow">
        <div class="row">
            <div class="col-3">
                <label for="cep" class="form-label">CEP</label>
                <input type="text" class="form-control" aria-describedby="emailHelp" id="cep" placeholder="111">
            </div>
            <div class="col-9">
                <label for="nomeRua" class="form-label">Nome da Rua</label>

                <input type="text" class="form-control" aria-describedby="emailHelp" id="nomeRua"
                    placeholder="José Emilio">
            </div>
        </div>

        <div class="row">
            <div class="col-3">
                <label for="nomeRua" class="form-label">Número</label>

                <input type="text" class="form-control" aria-describedby="emailHelp" id="nomeRua" placeholder="276">
            </div>
            <div class="col-4">
                <label for="nomeRua" class="form-label">Complemento</label>

                <input type="text" class="form-control" aria-describedby="emailHelp" id="nomeRua"
                    placeholder="José Emilio">
            </div>
            <div class="col-5">
                <label for="nomeRua" class="form-label">Bairro</label>

                <input type="text" class="form-control" aria-describedby="emailHelp" id="nomeRua" placeholder="Konoha">
            </div>
        </div>

        <hr>

        <div class="description">
            <label for="nomeRua" class="form-label">Descrição do ocorrido</label>

            <textarea name="" id="" rows="3" class="form-control"
                placeholder="Na Avenida Gisele Constantino, próximo ao bairro Parque Bela Vista, em Votorantim, há diversos buracos na via e falta de iluminação pública em alguns trechos. Durante a noite, motoristas e pedestres enfrentam dificuldades e riscos de acidentes. Solicito manutenção urgente e melhoria na iluminação do local."></textarea>
        </div>

        <hr>

        <div class="categoriaDenuncia">
            <label for="">Categoria da Denuncia</label>

            <select name="categoria" id="categoria" class="form-select" aria-label="Default select example">
                <option selected>Selecione uma categoria</option>

                <optgroup label="Infraestrutura">
                    <option value="">Buracos</option>
                    <option value="">Calçadas danificadas</option>
                    <option value="">Sinalização quebrada</option>
                </optgroup>

                <optgroup label="Iluminação">
                    <option value="">Postes apagados</option>
                    <option value="">Falta de iluminação</option>
                    <option value="">Problemas eletrônicos urbanos</option>
                </optgroup>

                <optgroup label="Limpeza Urbana">
                    <option value="">Lixo acumulado</option>
                    <option value="">Entulho irregular</option>
                    <option value="">Terrenos abandonados</option>
                </optgroup>

                <optgroup label="Saneamento">
                    <option value="">Vazamento de água</option>
                    <option value="">Esgoto</option>
                    <option value="">Problemas em vias públicas</option>
                </optgroup>
            </select>
        </div>

        <hr>

        <div class="resultadoEsperado">
            <label for="nomeRua" class="form-label">Resultado esperado</label>

            <textarea name="" id="" rows="3" class="form-control"
                placeholder="Digite o resultado esperado da denuncia"></textarea>
        </div>

        <hr>

        <div class="imagensSave">

        </div>


        <div class="acoes-denuncia d-grid gap-2">
            <button class="btn btn-success btn-acao">
                <i class="bi bi-check-circle"></i>
                Resolvido
            </button>

            <button class="btn btn-warning btn-acao">
                <i class="bi bi-clock-history"></i>
                Em andamento
            </button>

            <button class="btn btn-danger btn-acao">
                <i class="bi bi-x-circle"></i>
                Recusado
            </button>

            <a href="../../views/adm/feedDenuncias.html" class="btn btn-primary btn-acao">
                <i class="bi bi-arrow-left"></i>
                Voltar
            </a>
        </div>
    </div>
</form>
